extends: existence
message: "Vague cryptography policy language: '%s'. ISO 27001 Annex A.10 requires a cryptographic controls policy specifying named algorithms, minimum key lengths, defined key lifecycle procedures, and explicit use cases for encryption."
link: "https://www.iso.org/standard/27001"
level: warning
ignorecase: true
tokens:
  - appropriate cryptographic controls
  - encryption where necessary
  - suitable cryptographic measures
  - reasonable key management
  - encryption as appropriate
