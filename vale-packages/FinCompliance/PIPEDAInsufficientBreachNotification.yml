extends: existence
message: "Insufficient breach notification language: '%s'. PIPEDA Section 10.1(1) requires reporting breaches to the Commissioner where there is a real risk of significant harm. Section 10.1(3)-(4) requires notification to affected individuals as soon as feasible. Specify timelines and notification procedures explicitly."
link: "https://laws-lois.justice.gc.ca/eng/acts/p-8.6/page-5.html"
level: error
ignorecase: true
tokens:
  - notify affected parties
  - inform as soon as possible
  - report breaches promptly
  - notify in a timely manner
  - inform within reasonable time
  - communicate as quickly as possible
  - notify at the earliest opportunity
  - inform affected individuals promptly
  - report as soon as practicable
  - notify when reasonably possible
  - inform in due course
  - notify you promptly
  - we will inform you of any breach
  - notify you as soon as possible
