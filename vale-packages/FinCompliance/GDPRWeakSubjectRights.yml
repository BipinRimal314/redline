extends: existence
message: "Weak data subject rights language: '%s'. GDPR Articles 15-22 grant enforceable rights with a mandatory 30-day response period (extendable to 90 days with notice). Replace vague language with specific processes, timelines, and conditions."
link: "https://gdpr-info.eu/art-15-gdpr/"
level: error
ignorecase: true
