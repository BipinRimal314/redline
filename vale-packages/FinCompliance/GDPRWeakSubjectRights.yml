  - best efforts to fulfill
  - requests handled on a case-by-case basis
  - may take reasonable steps
  - we aim to respond promptly
  - requests considered at our discretion
  - response within a reasonable time
  - we will attempt to process
  - handled in due course
  - addressed when practicable
