extends: existence
message: "Vague business continuity language: '%s'. ISO 27001:2022 A.5.29 (Disruption preparedness), A.5.30 (ICT readiness for business continuity) require documented continuity plans with defined RTOs, RPOs, specific recovery procedures, named responsible parties, and scheduled testing."
link: "https://www.iso.org/standard/27001"
level: warning
ignorecase: true
tokens:
  - appropriate continuity measures
  - reasonable recovery procedures
  - suitable business continuity
  - continuity plans as needed
  - adequate backup arrangements
