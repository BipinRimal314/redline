extends: existence
message: "Weak consent language: '%s'. GDPR Article 7 requires freely given, specific, informed, and unambiguous consent through a clear affirmative action. Pre-checked boxes, bundled consent, and implied consent do not meet GDPR requirements."
link: "https://gdpr-info.eu/art-7-gdpr/"
level: error
ignorecase: true
