extends: existence
message: "Weak compliance monitoring language: '%s'. ISO 27001 Annex A.18 requires compliance reviews with explicit frequencies, defined scope, named reviewers, documented audit criteria, and specific corrective action timelines."
link: "https://www.iso.org/standard/27001"
level: warning
ignorecase: true
tokens:
  - regular compliance reviews
  - periodic compliance checks
  - compliance monitored as appropriate
  - reviewed from time to time
  - compliance assessed periodically
