extends: existence
message: "Weak compliance monitoring language: '%s'. ISO 27001:2022 A.5.31 (Legal/regulatory requirements), A.5.35 (Independent review), A.5.36 (Policy compliance) require compliance reviews with explicit frequencies, defined scope, named reviewers, documented audit criteria, and corrective action timelines."
link: "https://www.iso.org/standard/27001"
level: warning
ignorecase: true
tokens:
  - regular compliance reviews
  - periodic compliance checks
  - compliance monitored as appropriate
  - reviewed from time to time
  - compliance assessed periodically
