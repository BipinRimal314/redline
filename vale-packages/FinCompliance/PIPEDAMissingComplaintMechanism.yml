extends: existence
message: "Missing or inadequate complaint mechanism: '%s'. PIPEDA Principle 4.10 and Section 28 require that individuals be able to challenge an organization's compliance and file complaints with the Privacy Commissioner of Canada. Complaint procedures must be easily accessible and simple to use."
link: "https://laws-lois.justice.gc.ca/eng/acts/p-8.6/page-9.html"
level: warning
ignorecase: true
