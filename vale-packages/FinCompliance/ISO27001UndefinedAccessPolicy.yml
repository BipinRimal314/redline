extends: existence
message: "Undefined access policy language: '%s'. ISO 27001 Annex A.9.1 requires a documented access control policy with explicit authorization criteria, defined role-based permissions, and specific provisioning and deprovisioning procedures."
link: "https://www.iso.org/standard/27001"
level: warning
ignorecase: true
tokens:
  - appropriate access levels
  - suitable access permissions
  - reasonable access restrictions
  - access granted as needed
  - proper access management
