extends: existence
message: "Undefined access policy language: '%s'. ISO 27001:2022 A.5.15 (Access control), A.5.16 (Identity management), A.5.18 (Access rights) require a documented access control policy with explicit authorization criteria, defined role-based permissions, and specific provisioning/deprovisioning procedures."
link: "https://www.iso.org/standard/27001"
level: warning
ignorecase: true
tokens:
  - appropriate access levels
  - suitable access permissions
  - reasonable access restrictions
  - access granted as needed
  - proper access management
