extends: existence
message: "Vague risk assessment language: '%s'. BSA/AML programs must describe specific risk assessment methodology including risk categories, scoring criteria, and assessment frequency. Per FFIEC BSA/AML Examination Manual."
link: "https://bsaaml.ffiec.gov/manual/RiskAssessment/01"
level: warning
ignorecase: true
