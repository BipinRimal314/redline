extends: existence
message: "Overbroad collection language: '%s'. PIPEDA Principle 4.4 requires that the collection of personal information be limited to that which is necessary for the purposes identified by the organization. Information must not be collected indiscriminately."
link: "https://laws-lois.justice.gc.ca/eng/acts/p-8.6/page-9.html"
level: error
ignorecase: true
tokens:
