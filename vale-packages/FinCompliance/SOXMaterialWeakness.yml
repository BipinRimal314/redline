extends: existence
message: "Material weakness indicator: '%s'. This language suggests a potential material weakness or significant deficiency. Ensure proper evaluation and disclosure per PCAOB AS 2201."
link: "https://pcaobus.org/oversight/standards/auditing-standards/details/AS2201"
level: error
ignorecase: true
tokens:
