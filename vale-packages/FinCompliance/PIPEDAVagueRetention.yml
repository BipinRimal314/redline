extends: existence
message: "Vague retention language: '%s'. PIPEDA Principle 4.5 requires that personal information be retained only as long as necessary for the fulfilment of identified purposes. Organizations must develop guidelines with minimum and maximum retention periods. Information no longer required must be destroyed, erased, or made anonymous."
link: "https://laws-lois.justice.gc.ca/eng/acts/p-8.6/page-9.html"
level: error
ignorecase: true
