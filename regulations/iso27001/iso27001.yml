regulation:
  id: "ISO-27001"
  name: "ISO/IEC 27001:2022 Information Security Management System"
  authority: "ISO/IEC"
  cfr_reference: "ISO/IEC 27001:2022"
  document_types:
    - security-policy
    - risk-assessment
    - statement-of-applicability
    - compliance-policy
  requirements:
    - id: "ISO27001-01"
      description: "Risk treatment plans must specify named controls from Annex A with explicit risk owners and approval of the risk treatment plan"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001VagueRiskTreatment"
      regulation_paragraph: "Clause 6.1.3"
      legal_text: "Clause 6.1.3: The organization shall define and apply an information security risk treatment process to: (a) select appropriate information security risk treatment options, taking account of the risk assessment results; (b) determine all controls that are necessary to implement the information security risk treatment option(s) chosen; (c) compare the controls determined in 6.1.3 b) above with those in Annex A and verify that no necessary controls have been omitted; (d) produce a Statement of Applicability that contains the necessary controls and justification for inclusions, whether they are implemented or not, and the justification for exclusions of controls from Annex A; (e) formulate an information security risk treatment plan; and (f) obtain risk owners' approval of the information security risk treatment plan and acceptance of the residual information security risks."
    - id: "ISO27001-02"
      description: "Asset management documentation must include a classified inventory with defined owners and acceptable use rules"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001WeakAssetManagement"
      regulation_paragraph: "A.5.9, A.5.10, A.5.11"
      legal_text: "A.5.9 Inventory of information and other associated assets: An inventory of information and other associated assets, including owners, shall be identified and maintained. A.5.10 Acceptable use of information and other associated assets: Rules for the acceptable use and procedures for handling information and other associated assets shall be identified, documented and implemented. A.5.11 Return of assets: Personnel and other interested parties as appropriate shall return all the organization's assets in their possession upon change or termination of their employment, contract or agreement."
    - id: "ISO27001-03"
      description: "Access control policies must define explicit authorization criteria based on business and information security requirements, with identity management and access rights provisioning"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001UndefinedAccessPolicy"
      regulation_paragraph: "A.5.15, A.5.16, A.5.18"
      legal_text: "A.5.15 Access control: Rules to control physical and logical access to information and other associated assets shall be established and implemented based on business and information security requirements. A.5.16 Identity management: The full life cycle of identities shall be managed. A.5.18 Access rights: Access rights to information and other associated assets shall be provisioned, reviewed, modified and removed in accordance with the organization's topic-specific policy on and rules for access control."
    - id: "ISO27001-04"
      description: "Cryptographic controls must define a policy on the use of cryptography including key management procedures"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001VagueCryptographyPolicy"
      regulation_paragraph: "A.8.24"
      legal_text: "A.8.24 Use of cryptography: Rules for the effective use of cryptography, including cryptographic key management, shall be defined and implemented."
    - id: "ISO27001-05"
      description: "Supplier security requirements must include documented assessment criteria, contractual security clauses, and monitoring procedures for supplier services"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001WeakSupplierSecurity"
      regulation_paragraph: "A.5.19, A.5.20, A.5.21, A.5.22"
      legal_text: "A.5.19 Information security in supplier relationships: Processes and procedures shall be defined and implemented to manage the information security risks associated with the use of supplier's products or services. A.5.20 Addressing information security within supplier agreements: Relevant information security requirements shall be established and agreed with each supplier based on the type of supplier relationship. A.5.21 Managing information security in the ICT supply chain: Processes and procedures shall be defined and implemented to manage the information security risks associated with the ICT products and services supply chain. A.5.22 Monitoring, review and change management of supplier services: The organization shall regularly monitor, review, evaluate and manage change in supplier information security practices and service delivery."
    - id: "ISO27001-06"
      description: "Incident management procedures must define planning, assessment, response, learning, and evidence collection processes with event reporting channels"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001MissingIncidentManagement"
      regulation_paragraph: "A.5.24, A.5.25, A.5.26, A.5.27, A.5.28, A.6.8"
      legal_text: "A.5.24 Information security incident management planning and preparation: The organization shall plan and prepare for managing information security incidents by defining, establishing and communicating information security incident management processes, roles and responsibilities. A.5.25 Assessment and decision on information security events: The organization shall assess information security events and decide if they are to be categorized as information security incidents. A.5.26 Response to information security incidents: Information security incidents shall be responded to in accordance with the documented procedures. A.5.27 Learning from information security incidents: Knowledge gained from information security incidents shall be used to strengthen and improve the information security controls. A.5.28 Collection of evidence: The organization shall establish and implement procedures for the identification, collection, acquisition and preservation of evidence related to information security events. A.6.8 Information security event reporting: The organization shall provide a mechanism for personnel to report observed or suspected information security events through appropriate channels in a timely manner."
    - id: "ISO27001-07"
      description: "Business continuity plans must define information security requirements during disruption and ICT readiness procedures for continuity"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001VagueBCP"
      regulation_paragraph: "A.5.29, A.5.30"
      legal_text: "A.5.29 Information security during disruption: The organization shall plan how to maintain information security at an appropriate level during disruption. A.5.30 ICT readiness for business continuity: ICT readiness shall be planned, implemented, maintained and tested based on business continuity objectives and ICT continuity requirements."
    - id: "ISO27001-08"
      description: "Compliance monitoring must include identification of legal and contractual requirements, independent review of information security, and compliance verification with defined policies and standards"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001WeakComplianceMonitoring"
      regulation_paragraph: "A.5.31, A.5.35, A.5.36"
      legal_text: "A.5.31 Legal, statutory, regulatory and contractual requirements: Legal, statutory, regulatory and contractual requirements relevant to information security and the organization's approach to meet these requirements shall be identified, documented and kept up to date. A.5.35 Independent review of information security: The organization's approach to managing information security and its implementation including people, processes and technologies shall be reviewed independently at planned intervals, or when significant changes occur. A.5.36 Compliance with policies, rules and standards for information security: Compliance with the organization's established information security policy, topic-specific policies, rules and standards shall be regularly reviewed."
    - id: "ISO27001-09"
      description: "Awareness programs must ensure persons are aware of the information security policy, their ISMS contribution, and non-conformance implications, with appropriate education and training"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001UndefinedAwareness"
      regulation_paragraph: "Clause 7.3, A.6.3"
      legal_text: "Clause 7.3 Awareness: Persons doing work under the organization's control shall be aware of: (a) the information security policy; (b) their contribution to the effectiveness of the information security management system, including the benefits of improved information security performance; and (c) the implications of not conforming with the information security management system requirements. A.6.3 Information security awareness, education and training: Personnel of the organization and relevant interested parties shall receive appropriate information security awareness, education and training and regular updates of the organization's information security policy, topic-specific policies and procedures, as relevant for their job function."
    - id: "ISO27001-10"
      description: "Statement of Applicability must list each Annex A control with justified inclusion or exclusion rationale and implementation status"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.ISO27001VagueSOA"
      regulation_paragraph: "Clause 6.1.3(d)"
      legal_text: "Clause 6.1.3(d): The organization shall produce a Statement of Applicability that contains the necessary controls (see 6.1.3 b) and c)) and justification for inclusions, whether they are implemented or not, and the justification for exclusions of controls from Annex A."
