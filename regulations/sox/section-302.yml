regulation:
  id: "SOX-302"
  name: "Corporate Responsibility for Financial Reports"
  authority: "SEC"
  cfr_reference: "15 USC 7241"
  document_types:
    - certification
    - compliance-policy
    - management-assessment
  requirements:
    - id: "302-01"
      description: "Certification language must include the specific statements required by 15 USC 7241(a)(1)-(6), including that the signing officer has reviewed the report"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.SOXCertificationLanguage"
      regulation_paragraph: "15 USC 7241(a) — Required certification statements by CEO and CFO; SEC Rule 13a-14 (17 CFR 240.13a-14) — Implementing certification form"
      legal_text: "The Commission shall, by rule, require, for each company filing periodic reports under section 78m(a) or 78o(d) of this title, that the principal executive officer or officers and the principal financial officer or officers, or persons performing similar functions, certify in each annual or quarterly report filed or submitted under either such section of this title that— (1) the signing officer has reviewed the report; (2) based on the officer's knowledge, the report does not contain any untrue statement of a material fact or omit to state a material fact necessary in order to make the statements made, in light of the circumstances under which such statements were made, not misleading; (3) based on such officer's knowledge, the financial statements, and other financial information included in the report, fairly present in all material respects the financial condition and results of operations of the issuer as of, and for, the periods presented in the report. — 15 USC 7241(a)(1)-(3)"
    - id: "302-02"
      description: "Certifications must confirm that the signing officer has reviewed the report, per 15 USC 7241(a)(1)"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.SOXVagueCertification"
      regulation_paragraph: "15 USC 7241(a)(1) — Signing officer has reviewed the report"
      legal_text: "The signing officer has reviewed the report. — 15 USC 7241(a)(1). Based on the officer's knowledge, the report does not contain any untrue statement of a material fact or omit to state a material fact necessary in order to make the statements made, in light of the circumstances under which such statements were made, not misleading. — 15 USC 7241(a)(2)"
    - id: "302-03"
      description: "Certifications must address the signing officer's responsibility for establishing and maintaining internal controls over financial reporting, and must disclose any significant changes in internal controls, per 15 USC 7241(a)(4)-(5)"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.SOXVagueICFRCertification"
      regulation_paragraph: "15 USC 7241(a)(4) — Responsibility for internal controls; 15 USC 7241(a)(5) — Disclosure of significant changes"
      legal_text: "The signing officers are responsible for establishing and maintaining internal controls; [...] (4) the signing officers are responsible for establishing and maintaining internal controls and have— (A) designed such internal controls to ensure that material information relating to the issuer and its consolidated subsidiaries is made known to such officers by others within those entities, particularly during the period in which the periodic reports are being prepared; (B) evaluated the effectiveness of the issuer's internal controls as of a date within 90 days prior to the report; and (C) presented in the report their conclusions about the effectiveness of their internal controls based on their evaluation as of that date; (5) the signing officers have disclosed to the issuer's auditors and the audit committee of the board of directors— (A) all significant deficiencies in the design or operation of internal controls which could adversely affect the issuer's ability to record, process, summarize, and report financial data and have identified for the issuer's auditors any material weaknesses in internal controls; and (B) any fraud, whether or not material, that involves management or other employees who have a significant role in the issuer's internal controls. — 15 USC 7241(a)(4)-(5)"
