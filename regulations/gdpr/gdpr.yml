regulation:
  id: "GDPR"
  name: "General Data Protection Regulation"
  authority: "European Union"
  cfr_reference: "Regulation (EU) 2016/679"
  document_types:
    - privacy-policy
    - data-processing-agreement
    - compliance-policy
    - data-protection-impact-assessment
  requirements:
    - id: "GDPR-01"
      description: "Processing must identify a specific lawful basis under Article 6; vague or conditional references to legal grounds are non-compliant"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRVagueLegalBasis"
      regulation_paragraph: "Article 6 — Lawfulness of processing"
      legal_text: "Article 6(1): Processing shall be lawful only if and to the extent that at least one of the following applies: (a) the data subject has given consent to the processing of his or her personal data for one or more specific purposes; (b) processing is necessary for the performance of a contract to which the data subject is party or in order to take steps at the request of the data subject prior to entering into a contract; (c) processing is necessary for compliance with a legal obligation to which the controller is subject; (d) processing is necessary in order to protect the vital interests of the data subject or of another natural person; (e) processing is necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller; (f) processing is necessary for the purposes of the legitimate interests pursued by the controller or by a third party, except where such interests are overridden by the interests or fundamental rights and freedoms of the data subject which require protection of personal data, in particular where the data subject is a child."
    - id: "GDPR-02"
      description: "Consent must be freely given, specific, informed, and unambiguous through clear affirmative action; implied or bundled consent is invalid"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRWeakConsentLanguage"
      regulation_paragraph: "Article 4(11) — Definition of consent; Article 7 — Conditions for consent"
      legal_text: "Article 4(11): 'consent' of the data subject means any freely given, specific, informed and unambiguous indication of the data subject's wishes by which he or she, by a statement or by a clear affirmative action, signifies agreement to the processing of personal data relating to him or her. Article 7(2): If the data subject's consent is given in the context of a written declaration which also concerns other matters, the request for consent shall be presented in a manner which is clearly distinguishable from the other matters, in an intelligible and easily accessible form, using clear and plain language. Article 7(4): When assessing whether consent is freely given, utmost account shall be taken of whether, inter alia, the performance of a contract, including the provision of a service, is conditional on consent to the processing of personal data that is not necessary for the performance of that contract."
    - id: "GDPR-03"
      description: "Retention periods must be specified with concrete timeframes or objectively determinable criteria; open-ended storage language violates the storage limitation principle"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRMissingRetention"
      regulation_paragraph: "Article 5(1)(e) — Storage limitation; Article 13(2)(a) — Information to be provided"
      legal_text: "Article 5(1)(e): Personal data shall be kept in a form which permits identification of data subjects for no longer than is necessary for the purposes for which the personal data are processed; personal data may be stored for longer periods insofar as the personal data will be processed solely for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) subject to implementation of the appropriate technical and organisational measures required by this Regulation in order to safeguard the rights and freedoms of the data subject ('storage limitation'). Article 13(2)(a): the controller shall, at the time when personal data are obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing: the period for which the personal data will be stored, or if that is not possible, the criteria used to determine that period."
    - id: "GDPR-04"
      description: "International data transfers must identify the specific safeguard mechanism (adequacy decision, SCCs, BCRs, or derogation) relied upon"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRVagueDataTransfer"
      regulation_paragraph: "Articles 44-49 — Transfers of personal data to third countries"
      legal_text: "Article 44: Any transfer of personal data which are undergoing processing or are intended for processing after transfer to a third country or to an international organisation shall take place only if, subject to the other provisions of this Regulation, the conditions laid down in this Chapter are complied with by the controller and processor, including for onward transfers of personal data from the third country or an international organisation to another third country or to another international organisation. Article 46(1): In the absence of a decision pursuant to Article 45(3), a controller or processor may transfer personal data to a third country or an international organisation only if the controller or processor has provided appropriate safeguards, and on condition that enforceable data subject rights and effective legal remedies for data subjects are available."
    - id: "GDPR-05"
      description: "Data subject rights responses must specify the one-month timeline (Article 12(3)), verification process, and conditions for any extensions or refusals"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRWeakSubjectRights"
      regulation_paragraph: "Article 12(3) — Response timeline; Articles 15-22 — Rights of the data subject"
      legal_text: "Article 12(3): The controller shall provide information on action taken on a request under Articles 15 to 22 to the data subject without undue delay and in any event within one month of receipt of the request. That period may be extended by two further months where necessary, taking into account the complexity and number of the requests. The controller shall inform the data subject of any such extension within one month of receipt of the request, together with the reasons for the delay. Article 12(4): If the controller does not take action on the request of the data subject, the controller shall inform the data subject without delay and at the latest within one month of receipt of the request of the reasons for not taking action and on the possibility of lodging a complaint with a supervisory authority and seeking a judicial remedy."
    - id: "GDPR-06"
      description: "High-risk processing must reference a formal DPIA with methodology, findings, and mitigating measures rather than generic privacy review language"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRMissingDPIA"
      regulation_paragraph: "Article 35 — Data protection impact assessment"
      legal_text: "Article 35(1): Where a type of processing in particular using new technologies, and taking into account the nature, scope, context and purposes of the processing, is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall, prior to the processing, carry out an assessment of the impact of the envisaged processing operations on the protection of personal data. Article 35(7): The assessment shall contain at least: (a) a systematic description of the envisaged processing operations and the purposes of the processing, including, where applicable, the legitimate interest pursued by the controller; (b) an assessment of the necessity and proportionality of the processing operations in relation to the purposes; (c) an assessment of the risks to the rights and freedoms of data subjects referred to in paragraph 1; and (d) the measures envisaged to address the risks, including safeguards, security measures and mechanisms to ensure the protection of personal data and to demonstrate compliance with this Regulation taking into account the rights and legitimate interests of data subjects and other persons concerned."
    - id: "GDPR-07"
      description: "Processor agreements must use mandatory contractual language ('shall', 'must') specifying obligations, sub-processing rules, audit rights, and data return/deletion"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRVagueProcessorObligations"
      regulation_paragraph: "Article 28 — Processor"
      legal_text: "Article 28(3): Processing by a processor shall be governed by a contract or other legal act under Union or Member State law, that is binding on the processor with regard to the controller and that sets out the subject-matter and duration of the processing, the nature and purpose of the processing, the type of personal data and categories of data subjects and the obligations and rights of the controller. That contract or other legal act shall stipulate, in particular, that the processor: (a) processes the personal data only on documented instructions from the controller; (b) ensures that persons authorised to process the personal data have committed themselves to confidentiality; (c) takes all measures required pursuant to Article 32; (d) respects the conditions referred to in paragraphs 2 and 4 for engaging another processor; (e) assists the controller by appropriate technical and organisational measures; (f) assists the controller in ensuring compliance with the obligations pursuant to Articles 32 to 36; (g) at the choice of the controller, deletes or returns all the personal data to the controller after the end of the provision of services; (h) makes available to the controller all information necessary to demonstrate compliance with the obligations laid down in this Article and allow for and contribute to audits, including inspections, conducted by the controller or another auditor mandated by the controller."
    - id: "GDPR-08"
      description: "Breach notification procedures must reference the 72-hour supervisory authority notification deadline (where feasible, per Article 33(1)) and the criteria triggering data subject notification"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRInsufficientBreachNotification"
      regulation_paragraph: "Article 33(1) — Notification without undue delay and where feasible within 72 hours; Article 34 — Communication to data subject"
      legal_text: "Article 33(1): In the case of a personal data breach, the controller shall without undue delay and, where feasible, not later than 72 hours after having become aware of it, notify the personal data breach to the supervisory authority competent pursuant to Article 55, unless the personal data breach is unlikely to result in a risk to the rights and freedoms of natural persons. Where the notification to the supervisory authority is not made within 72 hours, it shall be accompanied by reasons for the delay. Article 34(1): When the personal data breach is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall communicate the personal data breach to the data subject without undue delay."
    - id: "GDPR-09"
      description: "Data protection must be integrated by design and by default with specific technical and organizational measures, not treated as conditional or optional"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRWeakPrivacyByDesign"
      regulation_paragraph: "Article 25 — Data protection by design and by default"
      legal_text: "Article 25(1): Taking into account the state of the art, the cost of implementation and the nature, scope, context and purposes of processing as well as the risks of varying likelihood and severity for rights and freedoms of natural persons posed by the processing, the controller shall, both at the time of the determination of the means for processing and at the time of the processing itself, implement appropriate technical and organisational measures, such as pseudonymisation, which are designed to implement data-protection principles, such as data minimisation, in an effective manner and to integrate the necessary safeguards into the processing in order to meet the requirements of this Regulation and protect the rights of data subjects. Article 25(2): The controller shall implement appropriate technical and organisational measures for ensuring that, by default, only personal data which are necessary for each specific purpose of the processing are processed."
    - id: "GDPR-10"
      description: "Where required, a designated DPO must be referenced with specified qualifications, independence, authority, and direct reporting line to highest management"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.GDPRMissingDPO"
      regulation_paragraph: "Articles 37-39 — Data Protection Officer"
      legal_text: "Article 37(1): The controller and the processor shall designate a data protection officer in any case where: (a) the processing is carried out by a public authority or body, except for courts acting in their judicial capacity; (b) the core activities of the controller or the processor consist of processing operations which, by virtue of their nature, their scope and/or their purposes, require regular and systematic monitoring of data subjects on a large scale; or (c) the core activities of the controller or the processor consist of processing on a large scale of special categories of data pursuant to Article 9 or personal data relating to criminal convictions and offences referred to in Article 10. Article 38(3): The controller and processor shall ensure that the data protection officer does not receive any instructions regarding the exercise of those tasks. He or she shall not be dismissed or penalised by the controller or the processor for performing his tasks. The data protection officer shall directly report to the highest management level of the controller or the processor. Article 37(5): The data protection officer shall be designated on the basis of professional qualities and, in particular, expert knowledge of data protection law and practices and the ability to fulfil the tasks referred to in Article 39."
