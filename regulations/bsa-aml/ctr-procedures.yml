regulation:
  id: "BSA-CTR"
  name: "Currency Transaction Report Procedures"
  authority: "FinCEN"
  cfr_reference: "31 CFR 1010.311"
  document_types:
    - compliance-policy
    - ctr-procedures
  requirements:
    - id: "CTR-01"
      description: "CTR procedures must address: (1) the $10,000 reporting threshold per 31 CFR 1010.311; (2) aggregation of multiple currency transactions per 31 CFR 1010.313; (3) structuring detection per 31 USC 5324; (4) CTR exemption criteria per 31 CFR 1020.315"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.RequiredCDDCTRElements"
      regulation_paragraph: "31 CFR 1010.311 — CTR filing obligation for transactions over $10,000; 31 CFR 1010.313 — Aggregation rule for multiple transactions; 31 USC 5324 — Structuring prohibition; 31 CFR 1020.315 — Exemptions"
    - id: "CTR-02"
      description: "Procedures must specify CTR filing timeline (15 calendar days per 31 CFR 1010.306(a)(1)) and must address exemption criteria and ongoing monitoring of exempt customers per 31 CFR 1020.315"
      severity: warning
      check_type: ai
      ai_prompt_key: "ctr_timeline_exemptions_adequacy"
      regulation_paragraph: "31 CFR 1010.306(a)(1) — 15-day filing deadline; 31 CFR 1020.315(b)-(d) — Exemption eligibility, designation, and annual review requirements"
