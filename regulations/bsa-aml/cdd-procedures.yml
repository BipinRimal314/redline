regulation:
  id: "BSA-CDD"
  name: "Customer Due Diligence Procedures"
  authority: "FinCEN"
  cfr_reference: "31 CFR 1010.230"
  document_types:
    - compliance-policy
    - cdd-procedures
  requirements:
    - id: "CDD-01"
      description: "Procedures must include required CDD elements: (1) identifying and verifying beneficial owners of legal entity customers (25% ownership threshold or single individual with significant control); (2) understanding the nature and purpose of customer relationships; (3) conducting ongoing monitoring. Enhanced due diligence (EDD) for higher-risk customers is a regulatory expectation from the FFIEC BSA/AML Examination Manual."
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.RequiredCDDCTRElements"
      regulation_paragraph: "31 CFR 1010.230(b)-(d) — Beneficial ownership identification and verification requirements; 31 CFR 1010.230(a) — Definitions (beneficial owner, legal entity customer); FFIEC BSA/AML Examination Manual — EDD expectations"
      legal_text: "Covered financial institutions are required to establish and maintain written procedures that are reasonably designed to identify and verify beneficial owners of legal entity customers and to include such procedures in their anti-money laundering compliance program. A beneficial owner is each individual, if any, who, directly or indirectly, owns 25 percent or more of the equity interests of the legal entity customer; and a single individual with significant responsibility to control, manage, or direct a legal entity customer. — 31 CFR 1010.230(a)-(b)"
    - id: "CDD-02"
      description: "Procedures must describe risk rating methodology for customer relationships to fulfill the CDD rule's requirement of understanding the nature and purpose of customer relationships and conducting ongoing monitoring"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.CDDVagueRiskRating"
      regulation_paragraph: "31 CFR 1010.230(d) — Ongoing monitoring requirement; FFIEC BSA/AML Examination Manual — Customer risk rating as a practical implementation of the CDD rule"
      legal_text: "Covered financial institutions are required to establish and maintain written procedures that are reasonably designed to: (1) Understand the nature and purpose of customer relationships for the purpose of developing a customer risk profile; and (2) Conduct ongoing monitoring to identify and report suspicious transactions and, on a risk basis, to maintain and update customer information. — 31 CFR 1010.230(d)"
