regulation:
  id: "SEC-MARKETING"
  name: "Investment Adviser Marketing Rule"
  authority: "SEC"
  cfr_reference: "17 CFR 275.206(4)-1"
  document_types:
    - marketing-materials
    - client-communication
    - adv-filing
  requirements:
    - id: "MKT-01"
      description: "Advertisements must not contain untrue statements of material fact, unsubstantiated material claims, or information reasonably likely to cause misleading inferences; no omission of material facts that would make the advertisement misleading"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.SECProhibitedClaims"
      regulation_paragraph: "Rule 206(4)-1(a)(1)-(3) — General prohibitions: untrue statements of material fact, omission of material facts, unsubstantiated material statements, and misleading implications or inferences"
      legal_text: "It shall constitute a fraudulent, deceptive, or manipulative act, practice, or course of business for any investment adviser to disseminate, directly or indirectly, any advertisement that: (1) Includes any untrue statement of a material fact, or omits a material fact necessary in order to make the statement made, in the light of the circumstances under which it was made, not misleading; (2) Includes a material statement of fact that the adviser does not have a reasonable basis for believing it will be able to substantiate upon demand by the Commission; (3) Includes information that would reasonably be likely to cause an untrue or misleading implication or inference to be drawn concerning a material fact relating to the investment adviser. — 17 CFR 275.206(4)-1(a)(1)-(3)"
    - id: "MKT-02"
      description: "Advertisements must not discuss potential benefits without providing fair and balanced treatment of associated material risks or limitations"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.SECPerformanceMisleading"
      regulation_paragraph: "Rule 206(4)-1(a)(4) — Prohibition on discussing potential benefits without fair and balanced treatment of material risks or limitations"
      legal_text: "It shall constitute a fraudulent, deceptive, or manipulative act for any investment adviser to disseminate any advertisement that: (4) Discusses any potential benefits to clients or investors connected with or resulting from the investment adviser's services or methods of operation without providing fair and balanced treatment of any material risks or material limitations associated with the potential benefits. — 17 CFR 275.206(4)-1(a)(4)"
    - id: "MKT-03"
      description: "Testimonials and endorsements in advertisements must include clear and prominent disclosures of whether the promoter is a client, whether compensation was provided, and any material conflicts of interest; a written agreement is required with compensated promoters (with exceptions for affiliates and de minimis compensation)"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.SECTestimonialViolations"
      regulation_paragraph: "Rule 206(4)-1(b) — Testimonial and endorsement requirements: disclosure of client status, compensation, and conflicts; Rule 206(4)-1(b)(3) — Disqualification provisions for promoters with disqualifying events"
      legal_text: "An advertisement may include a testimonial or endorsement only if the investment adviser: (1) Discloses, or reasonably believes that the person giving the testimonial or endorsement discloses, the following at the time the testimonial or endorsement is disseminated: (i) Clearly and prominently that it is a testimonial (given by a current client or investor) or endorsement (given by a person other than a current client or investor); (ii) Clearly and prominently that cash or non-cash compensation was provided for the testimonial or endorsement, if applicable; and (iii) Any material conflicts of interest on the part of the person giving the testimonial or endorsement; (2) The investment adviser has a written agreement with any person giving a testimonial or endorsement that is a promoter [...]. — 17 CFR 275.206(4)-1(b)(1)-(2)"
    - id: "MKT-04"
      description: "Hypothetical performance may only be included if the adviser has adopted policies and procedures reasonably designed to ensure it is relevant to the likely financial situation and investment objectives of the intended audience, and provides information underlying the hypothetical performance"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.SECHypotheticalPerformance"
      regulation_paragraph: "Rule 206(4)-1(d)(4) — Hypothetical performance conditions: policies and procedures for audience relevance, provision of underlying assumptions and methodology"
      legal_text: "An advertisement may include hypothetical performance only if the investment adviser: (i) Adopts and implements policies and procedures reasonably designed to ensure that the hypothetical performance is relevant to the likely financial situation and investment objectives of the intended audience of the advertisement; (ii) Provides sufficient information to enable the intended audience to understand the criteria used and assumptions made in calculating such hypothetical performance; and (iii) Provides (or, if the intended audience is an investor in a private fund, provides, or offers to provide promptly) sufficient information to enable the intended audience to understand the risks and limitations of using such hypothetical performance in making investment decisions. — 17 CFR 275.206(4)-1(d)(4)"
    - id: "MKT-05"
      description: "Advertisements must not include or exclude performance results or present performance time periods in a manner that is not fair and balanced; fee disclosures must be clear to avoid misleading implications about actual returns"
      severity: warning
      check_type: deterministic
      vale_rule: "FinCompliance.SECFeeDisclosure"
      regulation_paragraph: "Rule 206(4)-1(a)(6) — Prohibition on including/excluding performance results or presenting time periods in a manner that is not fair and balanced; Rule 206(4)-1(a)(7) — Otherwise materially misleading"
      legal_text: "It shall constitute a fraudulent, deceptive, or manipulative act for any investment adviser to disseminate any advertisement that: (6) Includes or excludes performance results, or presents performance time periods, in a manner that is not fair and balanced; (7) Is otherwise materially misleading. — 17 CFR 275.206(4)-1(a)(6)-(7)"
    - id: "MKT-06"
      description: "Advertisements targeting retail persons that present gross performance must also present net performance with equal prominence and in a format designed to facilitate comparison; performance must cover prescribed time periods"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.SECMissingNetPerformance"
      regulation_paragraph: "Rule 206(4)-1(d)(2) — Net performance requirement for retail-targeted advertisements presenting gross performance; Rule 206(4)-1(d)(3) — Required time period presentation (1, 5, and 10 years or since inception)"
      legal_text: "If an advertisement includes the performance results of any portfolio, or of a composite aggregation of related portfolios, the performance results must be presented for one-, five-, and ten-year periods, each presented with equal prominence and ending on a date that is no less recent than the most recent calendar year-end; except that if the relevant portfolio did not exist for a particular prescribed period, then the life of the portfolio or composite, as applicable, may be substituted. [...] An advertisement that includes gross performance results must also include net performance results, which must be presented with at least equal prominence to, and in a format designed to facilitate comparison with, the gross performance results. — 17 CFR 275.206(4)-1(d)(2)-(3)"
    - id: "MKT-07"
      description: "Advertisements referencing specific investment advice must present it in a fair and balanced manner, and must not cherry-pick favorable results while omitting material risks or limitations"
      severity: error
      check_type: deterministic
      vale_rule: "FinCompliance.SECCherryPickedPerformance"
      regulation_paragraph: "Rule 206(4)-1(a)(4) — Fair and balanced treatment of material risks alongside benefits; Rule 206(4)-1(a)(5) — Specific investment advice must be presented fairly"
      legal_text: "It shall constitute a fraudulent, deceptive, or manipulative act for any investment adviser to disseminate any advertisement that: (4) Discusses any potential benefits to clients or investors connected with or resulting from the investment adviser's services or methods of operation without providing fair and balanced treatment of any material risks or material limitations associated with the potential benefits; (5) References specific investment advice provided by the investment adviser in a manner that is not fair and balanced. — 17 CFR 275.206(4)-1(a)(4)-(5)"
